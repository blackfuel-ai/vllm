name: Build ROCm Image

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
      target:
        description: 'Build target'
        required: false
        default: 'vllm-test'
        type: choice
        options:
          - 'vllm-test'
          - 'vllm-openai'
          - 'vllm-dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/vllm-rocm

jobs:
  build-rocm-image:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ inputs.target }}

      - name: Build and push ROCm image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile.rocm
          target: ${{ inputs.target }}
          push: ${{ inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=vllm/vllm-openai-rocm:base-nightly-e80e633927ab11570cc4d07a55e5420d05c7fe99
            VLLM_REPO=https://github.com/blackfuel-ai/vllm.git
            VLLM_BRANCH=${{ github.ref_name }}